spring.application.name=inventory-multiagent

# ── H2 in-memory database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:inventorydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Spring Data JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: Hibernate creates all tables from @Entity on startup, drops them on shutdown.
# No schema.sql needed for DDL.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Ensure Hibernate creates tables BEFORE data.sql seed script runs
spring.jpa.defer-datasource-initialization=true

# ── Seed data (data.sql runs after Hibernate creates tables) ──────────────────
spring.sql.init.mode=always

# ── LangChain4j — Google AI Gemini auto-configuration ────────────────────────
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-2.0-flash
langchain4j.google-ai-gemini.chat-model.temperature=0.2
langchain4j.google-ai-gemini.chat-model.max-output-tokens=2048

# ── Resilience4j — Circuit Breaker ───────────────────────────────────────────
resilience4j.circuitbreaker.instances.gemini.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gemini.sliding-window-size=5
resilience4j.circuitbreaker.instances.gemini.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.gemini.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.gemini.register-health-indicator=false

# ── Resilience4j — Retry ─────────────────────────────────────────────────────
resilience4j.retry.instances.gemini.max-attempts=3
resilience4j.retry.instances.gemini.wait-duration=2s
resilience4j.retry.instances.gemini.enable-exponential-backoff=true
resilience4j.retry.instances.gemini.exponential-backoff-multiplier=2

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.multiagent=INFO
logging.level.dev.langchain4j=WARN
logging.level.org.bsc.langgraph4j=WARN
logging.level.io.github.resilience4j=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.data=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %-40logger{40} - %msg%n
